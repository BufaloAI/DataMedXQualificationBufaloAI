name: Deploy website to GitHub Pages (gh-pages branch)
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node (for consistent shells)
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - name: Prepare static site
        run: |
          mkdir -p site
          cp index.html model.html style.css app.js site/
          touch site/.nojekyll
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./site
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
